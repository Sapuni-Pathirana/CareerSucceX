services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careersuccex}
      POSTGRES_USER: ${POSTGRES_USER:-careersuccex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careersuccex_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careersuccex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROK_API_KEY: ${GROK_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROK_MODEL: ${GROK_MODEL:-grok-4-1-fast-non-reasoning}
      HTTP_LLM_BASE_URL: ${HTTP_LLM_BASE_URL:-}
      HTTP_LLM_API_KEY: ${HTTP_LLM_API_KEY:-}
      HTTP_LLM_MODEL: ${HTTP_LLM_MODEL:-}
      NGROK_LLM_URL: ${NGROK_LLM_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-careersuccex}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-careersuccex}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-careersuccex_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-256-bits}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8080/api/v1/github/callback}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-char-secret-key!!}
      AI_SERVICE_URL: http://ai-service:8000
      APP_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
      CV_UPLOADS_PER_DAY: ${CV_UPLOADS_PER_DAY:-50}
      GITHUB_REFRESHES_PER_DAY: ${GITHUB_REFRESHES_PER_DAY:-20}
    volumes:
      - cv_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  cv_uploads:
