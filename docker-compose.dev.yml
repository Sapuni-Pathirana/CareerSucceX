# Dev frontend with Vite hot reload (save → auto refresh, no image rebuild).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up postgres redis ai-service backend frontend-dev
#
# Do not start the production `frontend` service at the same time (both use port 5173).

services:
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
